# 多品牌：在云端分别构建并推送到 gh-pages-<brand> 分支（默认 atomflow、minitoken）。

name: Publish static site to gh-pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        brand: [atomflow, minitoken]
    concurrency:
      group: gh-pages-${{ matrix.brand }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build VitePress (${{ matrix.brand }})
        env:
          DOC_BRAND: ${{ matrix.brand }}
        run: npm run docs:build

      - name: Deploy to gh-pages-${{ matrix.brand }}
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs-site/.vitepress/dist-${{ matrix.brand }}
          publish_branch: gh-pages-${{ matrix.brand }}
