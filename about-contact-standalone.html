<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>关于我们 · AtomFlow</title>
<meta name="description" content="核心价值与联络方式（独立导出页）" />
<!--
  iframe 内嵌：
  - src 使用本站同源路径，例如 /about-contact-standalone.html?embed=1
  - ?embed=1：略收紧间距，适合窄 iframe
  - 子页会向父窗口 postMessage：{ type: "td-about-contact-height", height: number }，便于父页自适应高度（见 about-contact-iframe-example.html）
-->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
<style>
:root {
  --vp-font-family-base: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  --vp-font-family-mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, monospace;
}
html, body { margin: 0; min-height: 100%; background: #131315; }
body { color: #e4e2e4; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
/* iframe / ?embed=1：压缩纵向节奏，避免外框过高 */
html.td-about--embed .td-contact {
  --td-c-section-gap: 2.5rem;
  --td-c-gutter: 1rem;
}
html.td-about--embed .td-contact__hero {
  min-height: 0;
  padding-top: 2rem;
  padding-bottom: 2rem;
}
html.td-about--embed .td-contact__channels h2 {
  margin-bottom: 2rem;
}
.td-icon {
  font-family: "Material Symbols Outlined";
  font-weight: normal;
  font-style: normal;
  font-size: 1.35rem;
  line-height: 1;
  display: inline-block;
  vertical-align: middle;
  font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
  color: #b6c4ff;
}
.td-contact {
  --td-c-bg: #131315;
  --td-c-on-surface: #e4e2e4;
  --td-c-on-surface-variant: #c3c5d9;
  /* 分割线：略弱于 #434656，贴近底色 */
  --td-c-outline-variant: rgba(196, 199, 217, 0.1);
  --td-c-surface-container: #1f1f21;
  --td-c-surface-high: #2a2a2c;
  --td-c-surface-lowest: #0e0e10;
  --td-c-surface-low: #1b1b1d;
  --td-c-primary: #0057ff;
  --td-c-primary-dim: #b6c4ff;
  --td-c-gutter: 1.5rem;
  --td-c-section-gap: 4rem;
  --td-c-container: 1280px;

  background: var(--td-c-bg);
  color: var(--td-c-on-surface);
  font-family: var(--vp-font-family-base);
  box-sizing: border-box;
}

.td-contact *,
.td-contact *::before,
.td-contact *::after {
  box-sizing: border-box;
}

.td-contact__hero {
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 3rem max(var(--td-c-gutter), env(safe-area-inset-left, 0px))
    3rem max(var(--td-c-gutter), env(safe-area-inset-right, 0px));
  text-align: center;
  min-height: 300px;
}

@media (max-width: 480px) {
  .td-contact__hero {
    min-height: 0;
    padding-top: 2.25rem;
    padding-bottom: 2.5rem;
  }
}

/* 首屏：椭圆形透明蓝渐变 + 轻模糊，与 #131315 底融在一起 */
.td-contact__hero-glow {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

.td-contact__hero-glow-inner {
  position: absolute;
  left: 50%;
  top: 56%;
  transform: translate(-50%, -50%);
  width: min(130vw, 1100px);
  height: min(52vh, 440px);
  background: radial-gradient(
    ellipse 100% 52% at 50% 50%,
    rgba(0, 87, 255, 0.26) 0%,
    rgba(0, 87, 255, 0.1) 40%,
    rgba(0, 87, 255, 0.03) 58%,
    rgba(0, 87, 255, 0) 78%
  );
  filter: blur(56px);
  opacity: 0.85;
}

.td-contact__hero-inner {
  position: relative;
  z-index: 2;
  width: 100%;
  max-width: min(var(--td-c-container), 100%);
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.td-contact__hero-title {
  margin: 0 0 1rem;
  font-size: clamp(2rem, 6vw, 3.5rem);
  font-weight: 700;
  line-height: 1.1;
  letter-spacing: -0.02em;
  background: linear-gradient(to bottom, #e4e2e4, #434656);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  border: none;
  padding: 0;
}

@media (min-width: 768px) {
  .td-contact__hero-title {
    font-size: clamp(2.75rem, 5vw, 4.5rem);
  }
}

@media (max-width: 380px) {
  .td-contact__hero-title {
    font-size: clamp(1.375rem, 8.5vw, 2.25rem);
  }
}

.td-contact__hero-lead {
  margin: 0;
  width: 100%;
  max-width: min(42rem, 100%);
  padding: 0 0.25rem;
  font-size: clamp(0.9375rem, 3.2vw, 1.125rem);
  line-height: 1.55;
  font-weight: 400;
  color: var(--td-c-on-surface-variant);
  text-align: center;
  white-space: normal;
  overflow-wrap: anywhere;
  word-break: break-word;
}

.td-contact__section {
  padding: var(--td-c-section-gap) var(--td-c-gutter);
  border-top: 1px solid var(--td-c-outline-variant);
}

.td-contact__section--flush-top {
  border-top: none;
}

.td-contact__inner {
  max-width: var(--td-c-container);
  margin: 0 auto;
}

.td-contact__section--values {
  background: var(--td-c-surface-lowest);
  border-top: 1px solid var(--td-c-outline-variant);
}

.td-contact__section-head {
  text-align: center;
  margin-bottom: 4rem;
}

.td-contact__section-head h2 {
  margin: 0 0 1rem;
  font-size: 2rem;
  font-weight: 600;
  line-height: 1.25;
  color: var(--td-c-on-surface);
  border: none;
  padding: 0;
}

.td-contact__section-head p {
  margin: 0;
  font-size: 1rem;
  line-height: 1.5;
  color: var(--td-c-on-surface-variant);
}

.td-contact__grid-3 {
  display: grid;
  grid-template-columns: 1fr;
  gap: 2rem;
}

@media (min-width: 768px) {
  .td-contact__grid-3 {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }
}

.td-contact__value-card {
  padding: 2rem;
  background: var(--td-c-surface-container);
  border-radius: 0.5rem;
  border: 1px solid var(--td-c-outline-variant);
  transition:
    border-color 0.2s ease,
    background-color 0.2s ease;
}

.td-contact__value-card:hover {
  border-color: var(--td-c-primary);
}

.td-contact__value-iconwrap {
  width: 3rem;
  height: 3rem;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 0.5rem;
  margin-bottom: 1.5rem;
  background: rgba(0, 87, 255, 0.1);
  transition: background-color 0.2s ease;
}

.td-contact__value-card:hover .td-contact__value-iconwrap {
  background: var(--td-c-primary);
}

.td-contact__value-iconwrap .td-icon {
  font-size: 1.5rem;
  color: var(--td-c-primary-dim);
  transition: color 0.2s ease;
}

.td-contact__value-card:hover .td-contact__value-iconwrap .td-icon {
  color: #ffffff;
}

.td-contact__value-card h3 {
  margin: 0 0 0.75rem;
  font-size: 1.5rem;
  font-weight: 600;
  line-height: 1.33;
  color: var(--td-c-on-surface);
  border: none;
  padding: 0;
}

.td-contact__value-card p {
  margin: 0;
  font-size: 1rem;
  line-height: 1.5;
  color: var(--td-c-on-surface-variant);
}

.td-contact__channels {
  text-align: center;
}

.td-contact__channels h2 {
  margin: 0 0 3rem;
  font-size: 2rem;
  font-weight: 600;
  color: var(--td-c-on-surface);
  border: none;
  padding: 0;
}

.td-contact__channel-row {
  display: grid;
  grid-template-columns: 1fr;
  gap: 1rem;
  width: 100%;
}

@media (min-width: 768px) {
  .td-contact__channel-row {
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    align-items: stretch;
  }
}

.td-contact__channel {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: 1.25rem 1.5rem;
  background: var(--td-c-surface-container);
  border: 1px solid var(--td-c-outline-variant);
  border-radius: 0.75rem;
  text-decoration: none !important;
  color: inherit;
  transition:
    border-color 0.2s ease,
    background-color 0.2s ease;
  width: 100%;
  min-width: 0;
}

.td-contact__channel:hover {
  border-color: var(--td-c-primary);
  background: var(--td-c-surface-high);
}

.td-contact__channel-icon {
  width: 2.5rem;
  height: 2.5rem;
  border-radius: 0.5rem;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  background: rgba(0, 87, 255, 0.1);
  transition: background-color 0.2s ease;
}

.td-contact__channel:hover .td-contact__channel-icon {
  background: var(--td-c-primary);
}

.td-contact__channel-icon .td-icon {
  font-size: 1.25rem;
  color: var(--td-c-primary-dim);
  transition: color 0.2s ease;
}

.td-contact__channel:hover .td-contact__channel-icon .td-icon {
  color: #ffffff;
}

.td-contact__channel-text {
  text-align: left;
}

.td-contact__channel-k {
  display: block;
  font-size: 0.875rem;
  font-weight: 500;
  line-height: 1.25;
  letter-spacing: 0.01em;
  color: var(--td-c-on-surface-variant);
}

.td-contact__channel-v {
  display: block;
  font-family: var(--vp-font-family-mono);
  font-size: 0.8125rem;
  line-height: 1.5;
  color: var(--td-c-on-surface);
}

.td-contact__channel-v--qq {
  font-family: var(--vp-font-family-base);
  line-height: 1.55;
}

.td-contact__channel-v-qq-num {
  color: var(--td-c-on-surface-variant);
  font-weight: 400;
  margin-right: 0.35em;
}

.td-contact__channel-v--qq a {
  color: var(--td-c-primary);
  text-decoration: underline;
  text-underline-offset: 2px;
  font-weight: 500;
}

.td-contact__channel-v--qq a:hover {
  color: var(--td-c-on-surface);
}

</style>
</head>
<body>
<div class="td-contact">

<section class="td-contact__hero td-contact__section--flush-top" aria-label="首屏">
  <div class="td-contact__hero-glow" aria-hidden="true">
    <div class="td-contact__hero-glow-inner"></div>
  </div>
  <div class="td-contact__hero-inner">
    <h1 class="td-contact__hero-title">连接全球 AI 算力</h1>
    <p class="td-contact__hero-lead">我们正在构建下一代智能的核心骨干。一个连接原始算力与革命性应用之间的统一编排层。</p>
  </div>
</section>

<section class="td-contact__section td-contact__section--values" aria-labelledby="td-contact-values">
  <div class="td-contact__inner">
    <div class="td-contact__section-head">
      <h2 id="td-contact-values">核心价值</h2>
    </div>
    <div class="td-contact__grid-3">
      <div class="td-contact__value-card">
        <div class="td-contact__value-iconwrap">
          <span class="td-icon" aria-hidden="true">speed</span>
        </div>
        <h3>极致性能</h3>
        <p>毫秒必争。我们在链路层面持续优化，确保您的工作负载以更低延迟与更高吞吐交付。</p>
      </div>
      <div class="td-contact__value-card">
        <div class="td-contact__value-iconwrap">
          <span class="td-icon" aria-hidden="true">lock</span>
        </div>
        <h3>安全可靠</h3>
        <p>信任是我们的基石。端到端加密、最小权限与可审计日志，确保您的数据与调用边界清晰可控。</p>
      </div>
      <div class="td-contact__value-card">
        <div class="td-contact__value-iconwrap">
          <span class="td-icon" aria-hidden="true">terminal</span>
        </div>
        <h3>社区优先</h3>
        <p>由开发者构建，服务于开发者。我们保持文档优先与开放集成，欢迎反馈与共建。</p>
      </div>
    </div>
  </div>
</section>

<section class="td-contact__section" aria-labelledby="td-contact-ch">
  <div class="td-contact__inner td-contact__channels">
    <h2 id="td-contact-ch">联系我们</h2>
    <div class="td-contact__channel-row">
      <a class="td-contact__channel" href="mailto:atomflow.vip@gmail.com">
        <div class="td-contact__channel-icon">
          <span class="td-icon" aria-hidden="true">mail</span>
        </div>
        <div class="td-contact__channel-text">
          <span class="td-contact__channel-k">官方邮箱</span>
          <span class="td-contact__channel-v">atomflow.vip@gmail.com</span>
        </div>
      </a>
      <div class="td-contact__channel" role="group" aria-label="QQ 客服群">
        <div class="td-contact__channel-icon">
          <span class="td-icon" aria-hidden="true">groups</span>
        </div>
        <div class="td-contact__channel-text">
          <span class="td-contact__channel-k">QQ 客服群</span>
          <span class="td-contact__channel-v td-contact__channel-v--qq">
            <span class="td-contact__channel-v-qq-num">QQ: 532315634</span>
          </span>
        </div>
      </div>
    </div>
  </div>
</section>

</div>
<script>
(function () {
  var q = typeof location !== "undefined" ? location.search : "";
  var embedParam = /(?:^|[?&])embed=1(?:&|$)/.test(q);
  var inFrame = false;
  try {
    inFrame = window.self !== window.top;
  } catch (e) {
    inFrame = true;
  }
  if (embedParam || inFrame) {
    document.documentElement.classList.add("td-about--embed");
  }
  function postHeight() {
    if (!inFrame && !embedParam) return;
    if (window.parent === window) return;
    try {
      var h = Math.max(
        document.documentElement.scrollHeight,
        document.body ? document.body.scrollHeight : 0
      );
      window.parent.postMessage({ type: "td-about-contact-height", height: h }, "*");
    } catch (err) {}
  }
  window.addEventListener("load", postHeight);
  window.addEventListener("resize", postHeight);
  if (typeof ResizeObserver !== "undefined" && document.body) {
    new ResizeObserver(postHeight).observe(document.body);
  }
  setTimeout(postHeight, 80);
  setTimeout(postHeight, 400);
})();
</script>
</body>
</html>
